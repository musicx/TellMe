[project]
name = "TellMe"
version = "0.1.0"
mode = "hybrid-orchestrator"
primary_wiki = "primary_wiki"
default_host = "codex"

[data]
root_env = "OBSIDIAN_VAULT_PATH"
fallback_root = "~/.obsidian/llm_wiki"

[layout]
raw_dir = "raw"
staging_dir = "staging"
state_dir = "state"
runs_dir = "runs"
wiki_dir = "wiki"
templates_dir = "templates"
hosts_dir = "hosts"

[commands]
enabled = ["init", "ingest", "compile", "query", "lint", "reconcile"]

[wiki]
index_page = "index.md"
log_page = "log.md"
attachments_dir = "assets"
use_wikilinks = true
frontmatter_required = true

[obsidian]
viewer_only = true
graph_friendly = true
dataview_compatible = true

[defaults]
publish_policy = "balanced"
reconcile_policy = "preserve-human-edits"
model_policy = "host-routed"

[knowledge_graph]
primary_unit = "knowledge_point"
raw_is_source_evidence = true
wiki_is_graph_projection = true
require_source_attribution = true
conflict_policy = "explain-and-stage"
